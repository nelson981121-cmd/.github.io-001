<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffe6eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* 巨大化框框 */
        .card {
            background: white;
            padding: 50px;
            border-radius: 35px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.07);
            text-align: center;
            width: 95%; 
            max-width: 550px; 
        }

        /* 圖片專用防護框 */
        .image-container {
            width: 100%;
            height: 280px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        /* 標題字體 */
        .card h2 {
            color: #333;
            font-size: 3rem; 
            margin-bottom: 40px;
            line-height: 1.2;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; 
            height: 80px;
        }

        /* 按鈕尺寸 */
        button {
            padding: 16px 55px; 
            font-size: 1.5rem; 
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            transition: background-color 0.2s, transform 0.1s ease;
        }

        #yes-btn:hover {
            background-color: #ff758f;
        }

        #yes-btn:active {
            transform: scale(0.95);
        }

        #no-btn {
            background-color: #ffb3c1;
            color: white;
            z-index: 999;
            
            /* 【動畫核心】：這裡的 ease-out 讓逃跑動畫非常滑順，有減速煞車的高級感 */
            transition: transform 0.4s ease-out, background-color 0.2s; 
        }

        /* 愛心載入動畫 */
        .heart-loader {
            display: none;
            font-size: 80px; 
            color: #ff4d6d;
            animation: beat 0.8s infinite alternate;
            margin: 40px 0;
        }

        @keyframes beat {
            to { transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div id="question-screen">
            <div class="image-container">
                <img src="https://media.tenor.com/uvI857MZZn4AAAAM/boothill-boothill-hsr.gif"  
                     alt="Lovely Image"
                    width="400px"
                    height="400px;" >
            </div>
            
            <h2 id="title-text">Do you love me?</h2>
            
            <div class="btn-group">
                <button id="yes-btn">Yes</button>
                <button id="no-btn">No</button>
            </div>
        </div>

        <div class="heart-loader" id="loader">❤️</div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const bearImg = document.getElementById('bear-img');
        const titleText = document.getElementById('title-text');
        const loader = document.getElementById('loader');
        const btnGroup = document.querySelector('.btn-group');

        // 【核心修正】：用來永久鎖定按鈕最原始的「出生點」坐標
        let origLeft = null;
        let origTop = null;

        // 智慧型逃跑計算函式
        function moveNoButton() {
            // 獲取按鈕當前在螢幕上的位置與高寬
            const rect = noBtn.getBoundingClientRect();

            // 如果是第一次觸發，精準紀錄它在網頁未移動前的絕對坐標
            if (origLeft === null || origTop === null) {
                origLeft = rect.left;
                origTop = rect.top;
            }

            // 計算全螢幕的隨機安全邊界
            const padding = 25;
            const maxX = window.innerWidth - rect.width - padding;
            const maxY = window.innerHeight - rect.height - padding;

            // 產生隨機目標絕對坐標
            const targetX = Math.max(padding, Math.floor(Math.random() * maxX));
            const targetY = Math.max(padding, Math.floor(Math.random() * maxY));

            // 關鍵：計算「新目標」與「最原始出生點」的相對總距離
            // 這樣 transform 就不需要每次歸零，會直接從目前位置流暢滑過去！
            const translateX = targetX - origLeft;
            const translateY = targetY - origTop;

            // 執行平滑滑行
            noBtn.style.transform = `translate(${translateX}px, ${translateY}px)`;
        }

        // 當使用者縮放瀏覽器視窗時，自動重置按鈕位置，防止按鈕飛出螢幕外
        window.addEventListener('resize', () => {
            noBtn.style.transform = 'translate(0, 0)';
            origLeft = null;
            origTop = null;
        });

        // 滑鼠與觸控事件
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            moveNoButton();
        }, { passive: false });

        // 點擊 Yes
        yesBtn.addEventListener('click', () => {
            titleText.style.display = 'none';
            btnGroup.style.display = 'none';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                titleText.innerText = "I knew it! ";
                titleText.style.display = 'block';
                bearImg.src = "bear2.gif";
            }, 1500);
        });
    </script>
</body>
</html>
